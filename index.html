<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Hunter Pro | Advanced Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth Fade-In Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { opacity: 0; animation: fadeInUp 0.6s ease-out forwards; }
        
        /* Modal Backdrop Blur */
        dialog::backdrop {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
        }
        
        /* Custom scrollbar for horizontal comparison */
        .comparison-scroll::-webkit-scrollbar { height: 6px; }
        .comparison-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans overflow-x-hidden">

    <div id="hero-section" class="relative bg-white border-b border-slate-100 overflow-hidden">
        <div class="container mx-auto px-6 py-20 flex flex-col lg:flex-row items-center justify-between">
            <div class="lg:w-1/2 text-center lg:text-left z-10">
                <h1 class="text-6xl font-black tracking-tighter leading-none mb-6">
                    The Future <br><span class="text-blue-600">In Your Hands.</span>
                </h1>
                <p class="text-xl text-slate-500 mb-10 max-w-lg mx-auto lg:mx-0">
                    Search, compare, and discover the world's most advanced mobile technology in one place.
                </p>
                <div class="flex items-center gap-2 bg-slate-100 p-2 rounded-2xl shadow-inner max-w-md mx-auto lg:mx-0 border border-slate-200">
                    <input id="search-field" type="text" placeholder="Search (e.g. iPhone, Oppo, Samsung)" class="bg-transparent pl-4 w-full focus:outline-none font-medium">
                    <button onclick="handleSearch()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all active:scale-95">Search</button>
                </div>
            </div>
            <div class="lg:w-1/2 mt-12 lg:mt-0 relative flex justify-center">
                <img src="https://images.unsplash.com/photo-1592890288564-76628a30a657?q=80&w=1000&auto=format&fit=crop" 
                     alt="Mobile Tech" 
                     class="w-80 rounded-[3rem] shadow-2xl rotate-6 hover:rotate-0 transition-transform duration-700 border-8 border-white">
                <div class="absolute -bottom-6 -left-6 bg-white p-6 rounded-3xl shadow-xl animate-bounce hidden lg:block border border-slate-100">
                    <p class="text-xs font-bold text-slate-400 uppercase">Trending Now</p>
                    <p class="text-lg font-black">iPhone 15 Pro</p>
                </div>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-12">
        <div id="loading-spinner" class="hidden flex flex-col items-center justify-center my-20">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-blue-600 font-bold">Hunting for data...</p>
        </div>

        <div id="phone-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>

        <div id="show-all-container" class="hidden text-center mt-16">
            <button onclick="handleShowAll()" class="bg-slate-900 text-white py-4 px-10 rounded-2xl font-bold hover:bg-slate-800 transition-all">Show All Results</button>
        </div>
    </main>

    <div id="comparison-bar" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-5 rounded-[2rem] shadow-2xl flex items-center gap-8 z-50 transition-all duration-500 transform translate-y-40 opacity-0 border border-slate-700">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 h-10 w-10 rounded-full flex items-center justify-center font-black" id="compare-count">0</div>
            <p class="font-bold whitespace-nowrap">Phones Selected</p>
        </div>
        <div class="flex gap-4">
            <button onclick="openComparisonModal()" class="bg-white text-slate-900 px-6 py-2 rounded-xl font-bold hover:bg-slate-200 transition-all">Compare Now</button>
            <button onclick="clearComparison()" class="text-slate-400 hover:text-white transition-colors underline">Clear All</button>
        </div>
    </div>

    <dialog id="comparison_modal" class="rounded-3xl shadow-2xl p-0 w-[95%] max-w-6xl overflow-hidden bg-white">
        <div class="p-8 border-b flex justify-between items-center bg-slate-50">
            <h2 class="text-3xl font-black">Technical Comparison</h2>
            <form method="dialog"><button class="text-4xl text-slate-300 hover:text-slate-900">&times;</button></form>
        </div>
        <div id="comparison-content" class="flex flex-row divide-x divide-slate-100 overflow-x-auto comparison-scroll min-h-[500px]">
            </div>
    </dialog>

    <dialog id="show_details_modal" class="rounded-3xl shadow-2xl p-0 w-full max-w-2xl overflow-hidden bg-white">
        <div id="modal-content"></div>
        <div class="p-6 bg-slate-50 flex justify-end">
            <form method="dialog"><button class="px-8 py-3 bg-slate-200 text-slate-700 font-bold rounded-xl">Close</button></form>
        </div>
    </dialog>

    <script src="app.js"></script>
</body>
</html>
